<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Activitat interactiva de matemàtiques — Step Quiz">
    <link rel="icon" href="icon.png">
    <title>Regla de Ruffini</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #ede9fe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --warning: #d97706;
            --gris: #64748b;
            --gris-fosc: #334155;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --border-heavy: #cbd5e1;

            /* ════ TEMPS CSS ════════════════════════════════════════════════
               Sincronitza amb les constants JS T_* al principi del <script>  */
            --t-anim-pop:    0.35s;   /* pop-in d'una cel·la confirmada      */
            --t-anim-shake:  0.30s;   /* shake d'una cel·la incorrecta       */
            --t-anim-flash:  0.60s;   /* flash verd→blanc quan residu = 0    */
            --t-attract-dur: 0.70s;   /* durada del blink-shake candidats    */
            --t-fade-out:    0.50s;   /* fade-out del missatge "arrel"       */
            /* ═══════════════════════════════════════════════════════════════ */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: var(--gris-fosc);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1e293b;
            text-align: center;
            margin: 8px 0 16px;
        }

        .toolbar {
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
            color: var(--gris);
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .toolbar label { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .toolbar select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-heavy);
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .app-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 28px 36px;
            width: 100%;
            max-width: 820px;
        }

        .poly-display {
            text-align: center;
            font-size: 1.12rem;   /* 1.6rem × 0.70 ≈ 1.12rem */
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .poly-display sup { font-size: 0.7em; }

        /* Fila polinomi + comptador d'errors */
        .poly-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .poly-row .poly-display { margin-bottom: 0; }

        .btn-errors {
            flex-shrink: 0;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1.5px solid #cbd5e1;
            background: #f1f5f9;
            color: var(--gris);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: default;
            white-space: nowrap;
        }
        .btn-errors.finished {
            background: var(--primary);
            border-color: var(--primary-dark);
            color: white;
        }

        .hint-box {
            background: var(--primary-light);
            border: 1px solid #c4b5fd;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.9rem;
            color: var(--primary-dark);
            margin-bottom: 18px;
            text-align: center;
        }
        .hint-box strong { font-weight: 700; }

        .candidates-area {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            margin-bottom: 4px;
        }
        #nextStepSlot { flex-shrink: 0; }
        .candidates-right { display: flex; flex-direction: column; align-items: center; }
        .candidates-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gris);
            margin-bottom: 8px;
        }
        .candidates-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 24px;
            align-items: center;
        }
        .candidates-grid {
            display: inline-grid;
            row-gap: 6px;
            column-gap: 8px;
        }

        @keyframes candidates-attract {
            0%   { transform: translateX(0);    box-shadow: 0 0 0 0px var(--primary-light); }
            15%  { transform: translateX(-2px); box-shadow: 0 0 0 6px var(--primary-light); }
            30%  { transform: translateX(2px);  box-shadow: 0 0 0 0px var(--primary-light); }
            45%  { transform: translateX(-2px); box-shadow: 0 0 0 6px var(--primary-light); }
            60%  { transform: translateX(2px);  box-shadow: 0 0 0 0px var(--primary-light); }
            75%  { transform: translateX(-1px); box-shadow: 0 0 0 6px var(--primary-light); }
            90%  { transform: translateX(1px);  box-shadow: 0 0 0 0px var(--primary-light); }
            100% { transform: translateX(0);    box-shadow: 0 0 0 0px var(--primary-light); }
        }
        .candidates-attract {
            border-radius: 12px;
            animation: candidates-attract var(--t-attract-dur) ease-in-out;
        }
        .btn-candidate {
            min-width: 44px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 2px solid var(--border-heavy);
            background: white;
            font-size: 1rem;
            font-weight: 700;
            color: var(--gris-fosc);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-candidate:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .btn-candidate:disabled { opacity: 0.35; cursor: default; }
        .btn-candidate.tried-wrong {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #b91c1c;
            text-decoration: line-through;
        }
        .btn-candidate.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .ruffini-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .ruffini-table {
            border-collapse: separate;
            border-spacing: 0;
            margin: 0 auto;
        }
        .ruffini-table td {
            text-align: center;
            vertical-align: middle;
            padding: 0;
            height: 52px;
        }
        .cell-root {
            width: 54px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            border-right: 3px solid #1e293b;
            padding-right: 10px;
        }
        .cell-coef {
            width: 70px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
        }
        .cell-prod {
            width: 70px;
            font-size: 1.1rem;
            color: var(--gris);
            font-style: italic;
            height: 30px;
            vertical-align: bottom;
            padding-bottom: 2px;
        }
        .row-divider td {
            border-top: 2.5px solid #1e293b;
            padding-top: 6px;
        }
        .cell-result { width: 70px; height: 52px; }
        .cell-input {
            width: 58px;
            height: 44px;
            text-align: center;
            border: 2.5px solid var(--border-heavy);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
        }
        .cell-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .cell-input:disabled {
            background: white;
            border-color: transparent;
            color: #1e293b;
            cursor: default;
        }
        .cell-input.confirmed {
            background: white;
            border-color: transparent;
            color: #1e293b;
        }
        .cell-input.confirmed-root { color: #1e293b; }
        .cell-input.kb-selected {
            background: var(--primary);
            border-color: var(--primary-dark);
            color: white;
        }
        .cell-remainder .cell-input { border-style: solid; border-width: 2.5px; }
        .cell-remainder .cell-input.confirmed { border-color: transparent; }

        @keyframes pop-in {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.1); }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%     { transform: translateX(-6px); }
            75%     { transform: translateX(6px); }
        }
        @keyframes flash-green {
            0%   { background: var(--success-light); border-color: var(--success); }
            100% { background: white; border-color: transparent; }
        }
        .anim-pop   { animation: pop-in      var(--t-anim-pop)   cubic-bezier(0.34,1.56,0.64,1); }
        .anim-shake { animation: shake       var(--t-anim-shake) ease-in-out; }
        .anim-flash { animation: flash-green var(--t-anim-flash) ease-out forwards; }

        .feedback {
            min-height: 2rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 8px;
            margin-bottom: 16px;
            transition: opacity var(--t-fade-out) ease;
        }
        .feedback.fade-out { opacity: 0; }

        .btn-check {
            display: block;
            margin: 0 auto;
            padding: 14px 36px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--primary-dark);
            transition: 0.1s;
        }
        .btn-check:hover  { background: var(--primary-dark); }
        .btn-check:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-dark); }

        .btn-check-sm {
            display: block;
            padding: 8px 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--primary-dark);
            transition: 0.1s;
            white-space: nowrap;
        }
        .btn-check-sm:hover  { background: var(--primary-dark); }
        .btn-check-sm:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--primary-dark); }

        .btn-mini {
            display: block;
            margin: 10px auto 0;
            padding: 8px 20px;
            background: #e2e8f0;
            color: var(--gris-fosc);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-mini:hover { background: #cbd5e1; }

        .result-box {
            background: var(--success-light);
            border: 2px solid #86efac;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
            margin-top: 16px;
        }
        .result-box .result-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 6px;
        }
        .result-box .result-expr {
            font-size: 1.3rem;
            font-weight: 700;
            color: #166534;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }

        #customKeyboard {
            display: none;
            background: #f1f5f9;
            border: 2px solid var(--border-heavy);
            border-radius: 12px;
            padding: 12px 12px 16px;
            margin-top: 12px;
        }
        #customKeyboard.kb-visible { display: block; }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .kb-row:last-child { margin-bottom: 0; }
        .kb-btn {
            width: 58px; height: 52px;
            border-radius: 10px;
            border: 1.5px solid #cbd5e1;
            background: white;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 2px 0 #cbd5e1;
            transition: 0.08s;
            display: flex; align-items: center; justify-content: center;
        }
        .kb-btn:active { transform: translateY(2px); box-shadow: none; }
        .kb-btn.kb-enter {
            width: 80px;
            background: var(--primary);
            border-color: var(--primary-dark);
            color: white;
            box-shadow: 0 2px 0 var(--primary-dark);
            font-size: 1.5rem;
        }
        .kb-btn.kb-minus { background: #f8fafc; color: var(--primary); }
        .kb-btn.kb-del {
            background: #fff1f2;
            border-color: #fca5a5;
            color: #b91c1c;
            font-size: 1.1rem;
        }

        .debug-box {
            background: #fef08a;
            border: 2px dashed #ca8a04;
            border-radius: 8px;
            padding: 6px 14px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #78350f;
            margin-bottom: 14px;
            text-align: center;
        }
        .debug-box strong { color: #92400e; }

        @media (max-width: 600px) {
            .app-card { padding: 18px 14px; }
            .cell-coef, .cell-prod, .cell-result, .cell-input { width: 56px; }
            .cell-root { width: 44px; font-size: 1.1rem; }
            .cell-input { width: 46px; height: 40px; font-size: 1rem; }
        }

        /* ── Mòbil horitzontal: compactar zones superiors i reduir teclat ── */
        @media (orientation: landscape) and (max-height: 500px) {
            h1 { font-size: 1.1rem; margin: 4px 0 8px; }
            .app-card { padding: 10px 14px; }
            .toolbar { padding-bottom: 8px; margin-bottom: 10px; gap: 1rem; }
            .debug-box { padding: 3px 10px; font-size: 0.78rem; margin-bottom: 6px; }
            .poly-display { font-size: 0.95rem; margin-bottom: 8px; }
            .hint-box { padding: 6px 12px; font-size: 0.78rem; margin-bottom: 10px; }
            .candidates-label { font-size: 0.7rem; margin-bottom: 4px; }
            .candidates-row { margin-bottom: 10px; }
            .btn-candidate { padding: 5px 10px; font-size: 0.85rem; }

            /* Teclat més petit */
            .kb-btn { width: 48px; height: 40px; font-size: 1.1rem; }
            .kb-btn.kb-enter { width: 64px; font-size: 1.2rem; }
            .kb-row { gap: 5px; margin-bottom: 5px; }
            #customKeyboard { padding: 7px 10px 10px; margin-top: 8px; }
            .kb-btn[style] { width: 107px !important; } /* botó 0 ample */
        }
    </style>
</head>
<body>

<h1>Regla de Ruffini</h1>

<div class="app-card">
    <div class="toolbar">
        <label>Grau del polinomi:
            <select id="degreeSelect" onchange="initApp()">
                <option value="3" selected>Grau 3</option>
                <option value="4">Grau 4</option>
            </select>
        </label>
        <label>Tipus:
            <select id="monicSelect" onchange="initApp()">
                <option value="monic" selected>Polinomi mònic</option>
                <option value="nonmonic">Polinomi no mònic</option>
            </select>
        </label>
    </div>

    <div id="debugBox" class="debug-box"></div>
    <div class="poly-row">
        <button id="errorsBtn" class="btn-errors">errors: <span id="errorsCount">0</span></button>
        <div id="polyDisplay" class="poly-display"></div>
    </div>
    <div id="hintBox" class="hint-box"></div>

    <div class="candidates-area">
        <div id="nextStepSlot"></div>
        <div class="candidates-right">
            <div class="candidates-label">Escull un valor candidat a ser arrel:</div>
            <div id="candidatesRow" class="candidates-row"></div>
        </div>
    </div>

    <div id="rootFoundMsg" class="feedback"></div>

    <div class="ruffini-wrapper">
        <table class="ruffini-table" id="ruffiniTable"></table>
    </div>

    <!-- Teclat custom per a mòbil/tàctil — inline, just sota la taula -->
    <div id="customKeyboard">
        <div class="kb-row">
            <button class="kb-btn" data-key="7">7</button>
            <button class="kb-btn" data-key="8">8</button>
            <button class="kb-btn" data-key="9">9</button>
            <button class="kb-btn kb-del" data-key="del">⌫</button>
        </div>
        <div class="kb-row">
            <button class="kb-btn" data-key="4">4</button>
            <button class="kb-btn" data-key="5">5</button>
            <button class="kb-btn" data-key="6">6</button>
            <button class="kb-btn kb-minus" data-key="-">−</button>
        </div>
        <div class="kb-row">
            <button class="kb-btn" data-key="1">1</button>
            <button class="kb-btn" data-key="2">2</button>
            <button class="kb-btn" data-key="3">3</button>
            <button class="kb-btn kb-enter" data-key="enter">→</button>
        </div>
        <div class="kb-row">
            <button class="kb-btn" style="width:134px" data-key="0">0</button>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="actionArea"></div>
    <div id="resultBox"></div>
</div>

<script>
    // ════════════════════════════════════════════════════════════════════════════
    // CONSTANTS DE TEMPS  —  modifica aquí, no cal tocar res més al codi
    // ════════════════════════════════════════════════════════════════════════════
    //
    const DEBUG = 0;  // 1 = mostra la caixa DEBUG amb les arrels reals; 0 = oculta
    //
    //  JS (mil·lisegons):
    const T_AUTOFILL_DELAY    =  300;  // retard abans d'autoompletar la 1a cel·la
    const T_CELL_CONFIRM_NEXT =  400;  // retard entre cel·la correcta i la següent
    const T_ROOT_FOUND_DELAY  =  500;  // retard entre residu=0 i missatge "arrel"
    const T_REJECT_DELAY      =  500;  // retard entre residu≠0 i missatge rebuig
    const T_FOCUS_DELAY       =   50;  // retard per donar focus a l'input (PC)
    const T_ATTRACT_INIT      =   50;  // retard inicial del blink-shake candidats
    const T_ROOT_MSG_VISIBLE  = 5000;  // temps visible del missatge "Hem trobat..."
    const T_FADE_OUT_WAIT     = 1000;  // espera fins avançar després del fade-out
    const T_SCROLL_DELAY      =  150;  // retard abans del scroll al resultat final
    //
    //  CSS (edita les variables --t-* al bloc :root de l'estil):
    //    --t-anim-pop      pop-in de cada cel·la confirmada
    //    --t-anim-shake    shake d'una cel·la incorrecta
    //    --t-anim-flash    flash verd→blanc quan residu = 0
    //    --t-attract-dur   durada del blink-shake dels candidats
    //    --t-fade-out      durada del fade-out del missatge "Hem trobat..."
    //                      (T_FADE_OUT_WAIT ha de ser ≥ --t-fade-out en ms)
    //
    // ════════════════════════════════════════════════════════════════════════════

    // ─── ESTAT GLOBAL ────────────────────────────────────────────────────────
    let poly       = [];
    let polyOrig   = [];
    let degree     = 3;
    let roots      = [];
    let currentR   = null;
    let stepIdx    = 0;
    let results    = [];
    let triedWrong = new Set();
    let finished   = false;
    let divIdx     = 0;
    let debugRoots = [];
    let errorCount = 0;   // comptador d'errors de l'exercici

    // ─── GENERACIÓ DEL POLINOMI ──────────────────────────────────────────────
    function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickConstantTermAbs(monic) {
        const r = Math.random();
        let pool;
        if (r < 0.20)      pool = [2, 3, 5, 7, 11, 13, 17, 19];
        else if (r < 0.70) pool = [4, 6, 9, 10, 14, 15];
        else               pool = [8, 12, 18, 20];
        if (!monic) pool = pool.filter(x => x % 2 === 0);
        if (pool.length === 0) return pickConstantTermAbs(monic);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function factorizeInto(n, parts) {
        if (parts === 1) return [n];
        const divs = [];
        for (let d = 1; d <= n; d++) { if (n % d === 0) divs.push(d); }
        const d = divs[Math.floor(Math.random() * divs.length)];
        return [d, ...factorizeInto(n / d, parts - 1)];
    }

    function assignSigns(factors, wantPositiveProduct) {
        const result = factors.map(f => (Math.random() < 0.5 ? f : -f));
        const prod = result.reduce((a, b) => a * b, 1);
        if ((prod > 0) !== wantPositiveProduct) result[0] = -result[0];
        return result;
    }

    function generatePoly() {
        degree = parseInt(document.getElementById('degreeSelect').value);
        const monic = document.getElementById('monicSelect').value === 'monic';
        const lead  = monic ? 1 : (Math.random() < 0.5 ? 2 : -2);

        let chosenRoots;
        const zeroMode = Math.random() < 0.20;

        if (zeroMode && degree === 3) {
            const a = randInt(1, 4) * (Math.random() < 0.5 ? 1 : -1);
            const b = randInt(1, 4) * (Math.random() < 0.5 ? 1 : -1);
            const c = -(a + b);
            if (c === 0) return generatePoly();
            chosenRoots = [a, b, c];
        } else if (zeroMode && degree === 4) {
            const a = randInt(1, 4);
            const b = randInt(1, 4);
            if (a === b) return generatePoly();
            chosenRoots = [a, -a, b, -b];
        } else {
            const ctAbs     = pickConstantTermAbs(monic);
            const targetCt  = (Math.random() < 0.5 ? 1 : -1) * ctAbs;
            const divisor   = lead * Math.pow(-1, degree);
            const rootsProd = targetCt / divisor;
            if (!Number.isInteger(rootsProd) || rootsProd === 0) return generatePoly();
            const factors = factorizeInto(Math.abs(rootsProd), degree);
            chosenRoots   = assignSigns(factors, rootsProd > 0);
        }

        let coeffs = [lead];
        for (const r of chosenRoots) {
            const newC = new Array(coeffs.length + 1).fill(0);
            for (let i = 0; i < coeffs.length; i++) {
                newC[i]     += coeffs[i];
                newC[i + 1] -= r * coeffs[i];
            }
            coeffs = newC;
        }

        const ct           = coeffs[coeffs.length - 1];
        const intermediate = coeffs.slice(1, -1);
        const ctOk         = Math.abs(ct) >= 1 && Math.abs(ct) <= 20;
        const interOk      = intermediate.every(c => Math.abs(c) <= 9);
        if (!ctOk || !interOk) return generatePoly();

        polyOrig   = [...coeffs];
        poly       = [...coeffs];
        debugRoots = [...chosenRoots].sort((a, b) => a - b);
        roots      = [];
        triedWrong.clear();
        finished   = false;
    }

    // ─── DIVISORS ────────────────────────────────────────────────────────────
    function getDivisors(n) {
        n = Math.abs(n);
        if (n === 0) return [];
        let divs = [];
        for (let i = 1; i <= n; i++) {
            if (n % i === 0) { divs.push(i); divs.push(-i); }
        }
        return [...new Set(divs)].sort((a, b) => a - b);
    }

    function candidatesForCurrentPoly() {
        const constantTerm = poly[poly.length - 1];
        const leadCoef     = poly[0];
        let cands = new Set();

        if (constantTerm === 0) {
            cands.add(0);
            let nonZeroTerm = 0;
            for (let i = poly.length - 2; i >= 0; i--) {
                if (poly[i] !== 0) { nonZeroTerm = poly[i]; break; }
            }
            if (nonZeroTerm !== 0) {
                const divNZ   = getDivisors(nonZeroTerm);
                const divLead = getDivisors(Math.abs(leadCoef));
                for (const p of divNZ)
                    for (const q of divLead)
                        if (q !== 0 && Number.isInteger(p / q)) cands.add(p / q);
            }
        } else {
            const divConst = getDivisors(constantTerm);
            const divLead  = getDivisors(Math.abs(leadCoef));
            for (const p of divConst)
                for (const q of divLead)
                    if (q !== 0 && Number.isInteger(p / q)) cands.add(p / q);
        }
        return [...cands].sort((a, b) => a - b);
    }

    // ─── RENDERITZAR POLINOMI ────────────────────────────────────────────────
    function polyToHTML(coeffs) {
        const n = coeffs.length - 1;
        let parts = [];
        for (let i = 0; i <= n; i++) {
            const exp = n - i;
            const c   = coeffs[i];
            if (c === 0) continue;
            const absC = Math.abs(c);
            const sign = c > 0 ? (parts.length === 0 ? '' : ' + ') : (parts.length === 0 ? '−' : ' − ');
            const cs   = (absC === 1 && exp > 0) ? '' : String(absC);
            let term;
            if (exp === 0)      term = sign + String(absC);
            else if (exp === 1) term = sign + cs + 'x';
            else                term = sign + cs + 'x<sup>' + exp + '</sup>';
            parts.push(term);
        }
        return 'p(x) = ' + (parts.join('') || '0');
    }

    // ─── INICIALITZAR ────────────────────────────────────────────────────────
    function initApp() { generatePoly(); renderUI(); }

    function renderUI() {
        document.getElementById('polyDisplay').innerHTML  = polyToHTML(poly);
        renderDebug();
        renderHint();
        renderCandidates();
        document.getElementById('ruffiniTable').innerHTML = '';
        document.getElementById('rootFoundMsg').innerHTML = '';
        document.getElementById('feedback').innerText     = '';
        document.getElementById('actionArea').innerHTML   = '';
        document.getElementById('resultBox').innerHTML    = '';
        document.getElementById('nextStepSlot').innerHTML = '';
        errorCount = 0;
        updateErrorsBtn();
        currentR = null; stepIdx = 0; results = []; divIdx = 0;
    }

    function renderDebug() {
        const box = document.getElementById('debugBox');
        if (!DEBUG) { box.style.display = 'none'; return; }
        box.style.display = '';
        const s = debugRoots.map(r => `x = ${r}`).join(',  ');
        box.innerHTML = `🐛 <strong>DEBUG — Arrels:</strong>  ${s}`;
    }

    function updateErrorsBtn(done = false) {
        const btn   = document.getElementById('errorsBtn');
        const count = document.getElementById('errorsCount');
        count.textContent = errorCount;
        btn.classList.toggle('finished', done);
    }

    function renderHint() {
        const ct = poly[poly.length - 1];
        const lc = poly[0];
        let html;
        if (ct === 0) {
            html = `El terme independent és <strong>0</strong>, per tant <strong>r = 0</strong> és arrel segura. Els altres candidats venen dels divisors del primer terme no nul.`;
        } else {
            const divs = getDivisors(ct).filter(d => d > 0).join(', ');
            html = `Els divisors del terme independent són: ± {${divs}}`;
            if (Math.abs(lc) !== 1) html += ` (dividits pels de <strong>${lc}</strong>)`;
        }
        document.getElementById('hintBox').innerHTML = html;
    }

    function renderCandidates() {
        const row   = document.getElementById('candidatesRow');
        const cands = candidatesForCurrentPoly();
        row.innerHTML = '';

        const positives = cands.filter(r => r >= 0).sort((a, b) => a - b);
        const negatives = cands.filter(r => r < 0).sort((a, b) => a - b);
        const absVals   = positives.map(r => r);
        negatives.forEach(r => { if (!absVals.includes(Math.abs(r))) absVals.push(Math.abs(r)); });
        absVals.sort((a, b) => a - b);

        const grid = document.createElement('div');
        grid.className = 'candidates-grid';
        grid.style.gridTemplateColumns = `repeat(${absVals.length}, auto)`;

        // Fila superior: negatius
        absVals.forEach(abs => {
            const r   = abs === 0 ? null : -abs;
            const btn = document.createElement('button');
            btn.className = 'btn-candidate';
            if (r === null || !negatives.includes(r)) {
                btn.style.visibility = 'hidden'; btn.disabled = true;
            } else {
                btn.textContent = String(r); btn.dataset.val = r;
                if (triedWrong.has(r)) btn.classList.add('tried-wrong');
                btn.addEventListener('click', () => selectCandidate(r, btn));
            }
            grid.appendChild(btn);
        });

        // Fila inferior: positius
        absVals.forEach(abs => {
            const btn = document.createElement('button');
            btn.className = 'btn-candidate';
            if (!positives.includes(abs)) {
                btn.style.visibility = 'hidden'; btn.disabled = true;
            } else {
                btn.textContent = '+' + abs; btn.dataset.val = abs;
                if (triedWrong.has(abs)) btn.classList.add('tried-wrong');
                btn.addEventListener('click', () => selectCandidate(abs, btn));
            }
            grid.appendChild(btn);
        });

        row.appendChild(grid);
        setTimeout(() => triggerCandidatesAttract(), T_ATTRACT_INIT);
    }

    function triggerCandidatesAttract() {
        const row = document.getElementById('candidatesRow');
        row.classList.remove('candidates-attract');
        void row.offsetWidth;
        row.classList.add('candidates-attract');
        row.addEventListener('animationend', () => row.classList.remove('candidates-attract'), { once: true });
    }

    function clearCurrentAttempt() {
        const table = document.getElementById('ruffiniTable');
        const n = (divIdx === 0) ? 3 : 2;
        for (let i = 0; i < n && table.rows.length > 0; i++) table.deleteRow(table.rows.length - 1);
    }

    // ─── SELECCIÓ D'UN CANDIDAT ──────────────────────────────────────────────
    function selectCandidate(r, btnClicked) {
        if (finished) return;
        if (currentR !== null) clearCurrentAttempt();
        document.querySelectorAll('.btn-candidate').forEach(b => {
            if (!b.classList.contains('tried-wrong')) b.classList.remove('active');
        });
        btnClicked.classList.add('active');
        currentR = r; stepIdx = 0; results = [];
        document.getElementById('feedback').innerText = '';
        document.getElementById('actionArea').innerHTML = '';
        buildTable(r);
    }

    // ─── CONSTRUIR / AFEGIR FILES RUFFINI ───────────────────────────────────
    function buildTable(r) {
        const table = document.getElementById('ruffiniTable');
        const n     = poly.length;

        if (divIdx === 0) {
            table.innerHTML = '';
            const row1   = table.insertRow();
            const tdRoot = row1.insertCell();
            tdRoot.className = 'cell-root'; tdRoot.rowSpan = 2;
            tdRoot.style.verticalAlign = 'bottom';
            tdRoot.style.paddingBottom = '4px';
            tdRoot.innerHTML = r >= 0 ? '+' + r : '' + r;
            for (let j = 0; j < n; j++) {
                const td = row1.insertCell();
                td.className = 'cell-coef'; td.id = `coef-${divIdx}-${j}`;
                td.innerHTML = formatNum(poly[j]);
            }
            const row2 = table.insertRow();
            for (let j = 0; j < n; j++) {
                const td = row2.insertCell();
                td.className = 'cell-prod'; td.id = `prod-${divIdx}-${j}`;
                td.innerHTML = '&nbsp;';
            }
            const row3    = table.insertRow();
            row3.classList.add('row-divider');
            const tdBlank = row3.insertCell();
            tdBlank.className         = 'cell-root';
            tdBlank.style.borderRight = '3px solid #1e293b';
            tdBlank.style.borderTop   = '2.5px solid #1e293b';
            for (let j = 0; j < n; j++) {
                const td = row3.insertCell();
                td.className = (j === n - 1) ? 'cell-result cell-remainder' : 'cell-result';
                td.id = `res-${divIdx}-${j}`; td.appendChild(makeInput(divIdx, j));
            }
        } else {
            const row2   = table.insertRow();
            const tdRoot = row2.insertCell();
            tdRoot.className        = 'cell-root'; tdRoot.rowSpan = 2;
            tdRoot.style.verticalAlign = 'top';
            tdRoot.style.paddingTop    = '10px';
            tdRoot.innerHTML        = r >= 0 ? '+' + r : '' + r;
            tdRoot.style.borderRight = '3px solid #1e293b';
            for (let j = 0; j < n; j++) {
                const td = row2.insertCell();
                td.className = 'cell-prod'; td.id = `prod-${divIdx}-${j}`;
                td.innerHTML = '&nbsp;';
            }
            const row3 = table.insertRow();
            row3.classList.add('row-divider');
            for (let j = 0; j < n; j++) {
                const td = row3.insertCell();
                td.className = (j === n - 1) ? 'cell-result cell-remainder' : 'cell-result';
                td.id = `res-${divIdx}-${j}`; td.appendChild(makeInput(divIdx, j));
            }
        }

        setTimeout(() => autoFillFirst(), T_AUTOFILL_DELAY);
    }

    // ─── DETECCIÓ TÀCTIL ─────────────────────────────────────────────────────
    const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    function makeInput(dIdx, j) {
        const inp = document.createElement('input');
        inp.type      = 'text';
        inp.inputMode = isTouchDevice() ? 'none' : 'numeric';
        inp.className = 'cell-input';
        inp.id        = `inp-${dIdx}-${j}`;
        inp.disabled  = true;
        inp.setAttribute('autocomplete', 'off');
        inp.setAttribute('readonly', isTouchDevice());
        return inp;
    }

    function autoFillFirst() {
        const inp = document.getElementById(`inp-${divIdx}-0`);
        inp.value = poly[0]; inp.disabled = true;
        inp.classList.add('confirmed', 'anim-pop');
        results.push(poly[0]); stepIdx = 1;
        activateNextCell();
    }

    function activateNextCell() {
        if (stepIdx >= poly.length) return;

        const prod     = currentR * results[stepIdx - 1];
        const prodCell = document.getElementById(`prod-${divIdx}-${stepIdx}`);
        prodCell.innerHTML = `<em>${formatNum(prod)}</em>`;
        prodCell.classList.add('anim-pop');

        const inp = document.getElementById(`inp-${divIdx}-${stepIdx}`);
        inp.disabled = false; inp.removeAttribute('readonly');
        inp.value    = '';
        inp.classList.remove('confirmed', 'confirmed-root', 'anim-pop', 'kb-selected');
        kbClearOnNext = false;

        if (isTouchDevice()) {
            inp.setAttribute('readonly', true);
            showCustomKeyboard(inp);
        } else {
            inp.addEventListener('keydown', onKeyDown);
            setTimeout(() => inp.focus(), T_FOCUS_DELAY);
        }
        document.getElementById('actionArea').innerHTML = '';
    }

    function onKeyDown(e) {
        if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); checkCurrentCell(); }
    }

    // ─── TECLAT CUSTOM ───────────────────────────────────────────────────────
    let activeKbInput = null;
    let kbClearOnNext = false;  // quan true, el proper dígit sobreescriu el valor (simula "tot seleccionat")

    function showCustomKeyboard(inp) {
        activeKbInput = inp;
        document.getElementById('customKeyboard').classList.add('kb-visible');
        inp.focus();
        // Scroll suau per assegurar que la cel·la activa és visible per sobre del teclat
        setTimeout(() => inp.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
    }

    function hideCustomKeyboard() {
        document.getElementById('customKeyboard').classList.remove('kb-visible');
        activeKbInput = null;
    }

    function initCustomKeyboard() {
        document.querySelectorAll('#customKeyboard .kb-btn').forEach(btn => {
            btn.addEventListener('pointerdown', e => {
                e.preventDefault();
                if (!activeKbInput) return;
                const key = btn.dataset.key;
                if (key === 'del') {
                    kbClearOnNext = false;
                    activeKbInput.classList.remove('kb-selected');
                    activeKbInput.value = activeKbInput.value.slice(0, -1);
                } else if (key === 'enter') {
                    checkCurrentCell();
                } else if (key === '-') {
                    kbClearOnNext = false;
                    activeKbInput.classList.remove('kb-selected');
                    if (activeKbInput.value === '' || activeKbInput.value === '-')
                        activeKbInput.value = activeKbInput.value === '-' ? '' : '-';
                } else {
                    // Dígit
                    if (kbClearOnNext) {
                        activeKbInput.value = '';
                        kbClearOnNext = false;
                        activeKbInput.classList.remove('kb-selected');
                    }
                    if (activeKbInput.value === '-0') activeKbInput.value = '-';
                    activeKbInput.value += key;
                }
            });
        });
    }

    // ─── COMPROVACIÓ D'UNA CEL·LA ────────────────────────────────────────────
    function checkCurrentCell() {
        const inp      = document.getElementById(`inp-${divIdx}-${stepIdx}`);
        const fb       = document.getElementById('feedback');
        const entered  = parseInt(inp.value, 10);
        const expected = poly[stepIdx] + currentR * results[stepIdx - 1];

        if (isNaN(entered)) {
            fb.style.color = 'var(--warning)'; fb.innerText = '⚠️ Escriu un número.'; return;
        }
        if (entered !== expected) {
            fb.style.color = 'var(--danger)'; fb.innerText = '❌ No és correcte. Torna-ho a intentar.';
            inp.classList.remove('anim-shake'); void inp.offsetWidth; inp.classList.add('anim-shake');
            errorCount++; updateErrorsBtn();
            if (isTouchDevice()) {
                kbClearOnNext = true;
                inp.classList.add('kb-selected');
            } else {
                inp.select();
            }
            return;
        }

        fb.innerText = '';
        results.push(expected);
        inp.removeEventListener('keydown', onKeyDown);
        inp.disabled = true;

        const isLast = (stepIdx === poly.length - 1);
        const isZero = (expected === 0);

        if (isLast && isZero) {
            hideCustomKeyboard();
            inp.classList.add('confirmed', 'confirmed-root', 'anim-flash');
            setTimeout(() => confirmRootFound(), T_ROOT_FOUND_DELAY);
        } else if (isLast && !isZero) {
            hideCustomKeyboard();
            inp.classList.add('confirmed', 'anim-flash');
            setTimeout(() => rejectCandidate(), T_REJECT_DELAY);
        } else {
            inp.classList.add('confirmed', 'anim-flash');
            stepIdx++;
            setTimeout(() => activateNextCell(), T_CELL_CONFIRM_NEXT);
        }
    }

    // ─── ARREL TROBADA ───────────────────────────────────────────────────────
    function confirmRootFound() {
        const fb = document.getElementById('rootFoundMsg');
        fb.style.color = 'var(--success)';
        fb.innerHTML   = `✅ Hem trobat una arrel del polinomi, que és a = ${currentR}.`;

        roots.push(currentR);
        poly = results.slice(0, results.length - 1);

        document.querySelectorAll('.btn-candidate').forEach(b => {
            if (parseInt(b.dataset.val) === currentR) {
                b.disabled = true; b.classList.remove('active');
                b.style.background  = '#f1f5f9';
                b.style.borderColor = '#cbd5e1';
                b.style.color       = '#64748b';
            }
        });

        if (poly.length <= 1) { showFinalResult(); return; }
        showContinue();
    }

    function showContinue() {
        const slot = document.getElementById('nextStepSlot');
        const msg  = document.getElementById('rootFoundMsg');
        slot.innerHTML = '';

        const advance = () => {
            triedWrong.clear();
            currentR = null; stepIdx = 0; results = []; divIdx++;
            document.getElementById('feedback').innerText = '';
            msg.innerHTML = ''; msg.classList.remove('fade-out');
            document.getElementById('actionArea').innerHTML = '';
            slot.innerHTML = '';
            renderHint();
            renderCandidates();
        };

        const btn = document.createElement('button');
        btn.className   = 'btn-check-sm';
        btn.textContent = 'Següent pas';
        btn.onclick = () => { clearTimeout(autoTimer); advance(); };
        slot.appendChild(btn);
        document.getElementById('actionArea').innerHTML = '';

        const autoTimer = setTimeout(() => {
            msg.classList.add('fade-out');
            setTimeout(() => advance(), T_FADE_OUT_WAIT);
        }, T_ROOT_MSG_VISIBLE);
    }

    // ─── CANDIDAT DESCARTAT ──────────────────────────────────────────────────
    function rejectCandidate() {
        hideCustomKeyboard();
        const fb        = document.getElementById('feedback');
        const remainder = results[results.length - 1];
        fb.style.color  = 'var(--danger)';
        fb.innerHTML    = `❌ Residu = ${remainder} ≠ 0. Per tant, a = ${currentR} no és arrel.`;

        triedWrong.add(currentR);
        document.querySelectorAll('.btn-candidate').forEach(b => {
            if (parseInt(b.dataset.val) === currentR) {
                b.classList.add('tried-wrong'); b.classList.remove('active');
            }
        });

        const slot = document.getElementById('nextStepSlot');
        slot.innerHTML = '';
        document.getElementById('actionArea').innerHTML = '';

        const dismiss = () => {
            clearCurrentAttempt();
            fb.classList.remove('fade-out');
            fb.innerText = '';
            slot.innerHTML = '';
            currentR = null;
            // blink-shake igual que quan arriba un candidat nou
            triggerCandidatesAttract();
        };

        const btn = document.createElement('button');
        btn.className   = 'btn-check-sm';
        btn.textContent = 'Escull un altre valor';
        btn.onclick = () => { clearTimeout(autoTimer); dismiss(); };
        slot.appendChild(btn);

        const autoTimer = setTimeout(() => {
            fb.classList.add('fade-out');
            setTimeout(() => dismiss(), T_FADE_OUT_WAIT);
        }, T_ROOT_MSG_VISIBLE);
    }

    // ─── RESULTAT FINAL ──────────────────────────────────────────────────────
    function showFinalResult() {
        finished = true;
        document.getElementById('actionArea').innerHTML = '';
        updateErrorsBtn(true);  // torna el botó errors de color blau

        let expr = '';
        if (polyOrig[0] !== 1 && polyOrig[0] !== -1) expr += formatNum(polyOrig[0]);
        else if (polyOrig[0] === -1) expr += '−';

        const mult = new Map();
        for (const r of roots) mult.set(r, (mult.get(r) || 0) + 1);
        for (const [r, m] of mult.entries()) {
            const factor = `(x ${r >= 0 ? '− ' + r : '+ ' + Math.abs(r)})`;
            expr += m > 1 ? `${factor}<sup>${m}</sup>` : factor;
        }
        if (poly.length > 2) expr += ' · (' + polyToHTMLShort(poly) + ')';

        const box = document.getElementById('resultBox');
        box.innerHTML = `
            <div class="result-box">
                <div class="result-title">✅ Factorització completa</div>
                <div class="result-expr">p(x) = ${expr}</div>
                <button class="btn-check-sm" style="margin: 16px auto 0" onclick="initApp()">Exercici nou</button>
            </div>`;

        setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'center' }), T_SCROLL_DELAY);
    }

    // ─── UTILS ───────────────────────────────────────────────────────────────
    function formatNum(n) { return n >= 0 ? String(n) : '−' + String(Math.abs(n)); }

    function polyToHTMLShort(coeffs) {
        const n = coeffs.length - 1;
        let parts = [];
        for (let i = 0; i <= n; i++) {
            const exp = n - i; const c = coeffs[i];
            if (c === 0) continue;
            const absC = Math.abs(c);
            const sign = c > 0 ? (parts.length === 0 ? '' : '+') : (parts.length === 0 ? '−' : '−');
            const cs   = (absC === 1 && exp > 0) ? '' : String(absC);
            if (exp === 0)      parts.push(sign + String(absC));
            else if (exp === 1) parts.push(sign + cs + 'x');
            else                parts.push(sign + cs + 'x<sup>' + exp + '</sup>');
        }
        return parts.join('');
    }

    // ─── ARRENCADA ───────────────────────────────────────────────────────────
    window.onload = () => { initCustomKeyboard(); initApp(); };
</script>
