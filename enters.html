<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Activitat interactiva de matemàtiques — Step Quiz">
    <link rel="icon" href="icon.png">
    <title>Operacions amb Enters</title>

    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    3,
            defaultIntents:       4,
            defaultEnllocMitjana: 1
        };
    </script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/shared.css">

    <style>
        :root {
            --bg-color:      #f8fafc;
            --primary:       #0369a1;
            --primary-light: #e0f2fe;
            --primary-hover: #2563eb;
        }

        .expression-box {
            padding: 40px 20px; text-align: center; display: flex;
            justify-content: center; align-items: center; flex-wrap: wrap;
            gap: 10px; font-size: 1.8em; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; min-height: 120px; line-height: 1.5;
        }

        .token-num { padding: 10px; transition: all 0.3s; }
        .token-num.highlight      { background-color: var(--primary-light); border-radius: 6px; }
        .token-num.resolved-num   { color: var(--primary-hover); }

        .token-op {
            background-color: #f1f5f9; border: 2px solid var(--border-heavy);
            border-radius: 8px; padding: 5px 15px; color: #334155;
            cursor: pointer; transition: all 0.2s ease;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            font-size: 1em; touch-action: manipulation;
        }
        .token-op:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
        @media (hover: hover) {
            .token-op:hover {
                background-color: var(--primary-hover); border-color: #1e40af;
                color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            }
        }
        .token-op:active        { transform: scale(0.95); }
        .token-op.error-shake   { background-color: var(--danger-light) !important; border-color: var(--danger) !important; color: var(--danger) !important; animation: shake 0.2s; }
        .token-op.auto-selected { background-color: var(--primary-light); border-color: var(--primary); color: #334155; }
        .token-op.step0-blink   { animation: step0Blink 0.4s linear 5; }

        .op-instruction { display: none; padding: 0 20px 14px 20px; text-align: center; color: #475569; font-weight: 600; font-size: 1em; }
        .op-instruction.active { display: block; }
        .op-instruction-line.error { color: var(--danger); font-weight: 700; }
        .op-instruction-line.hint  { color: #475569; font-weight: 600; margin-top: 6px; }

        .resolution-panel {
            background-color: var(--bg-color); border-top: 1px solid var(--border-color);
            padding: 25px 20px; display: none; flex-direction: column;
            align-items: center; width: 100%;
        }

        .sub-problem {
            font-size: 1.5em; font-family: monospace; font-weight: bold;
            color: var(--primary); margin-bottom: 20px; letter-spacing: 2px; text-align: center;
        }

        .step-container { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.3s; }
        .step-container.active { display: flex; }

        .step-title { font-size: 1.1em; color: #475569; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; }

        .sign-buttons { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }

        .btn-sign {
            padding: 12px 20px; font-size: 1.1em; font-weight: bold; border-radius: 8px;
            border: 2px solid var(--border-heavy); background: white; color: #334155;
            cursor: pointer; transition: 0.2s; text-transform: capitalize;
            flex: 1; min-width: 80px; max-width: 150px; text-align: center; touch-action: manipulation;
        }
        .btn-sign:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
        @media (hover: hover) {
            .btn-sign:hover { background: var(--primary-light); border-color: #0ea5e9; color: var(--primary); transform: translateY(-2px); }
        }
        .btn-sign:active      { transform: scale(0.95); }
        .btn-sign.error-shake { background-color: var(--danger-light); border-color: var(--danger); color: var(--danger); animation: shake 0.2s; }

        .value-input-group { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }

        input[type="text"]#value-input {
            width: 130px; font-family: 'Courier New', Courier, monospace; font-size: 1.5em;
            font-weight: bold; padding: 12px; text-align: center;
            border: 2px solid var(--border-heavy); border-radius: 6px; outline: none;
        }
        input[type="text"]#value-input:focus { border-color: #0ea5e9; }

        @media (max-width: 480px) {
            .expression-box { font-size: 1.3em; padding: 20px 10px; gap: 6px; min-height: 80px; }
            .token-num  { padding: 5px; }
            .token-op   { font-size: 0.9em; padding: 6px 10px; }
            .resolution-panel { padding: 20px 15px; }
            .sub-problem { font-size: 1.3em; }
            .sign-buttons { gap: 8px; }
            .btn-sign   { padding: 12px 5px; font-size: 0.95em; min-width: 0; }
            input[type="text"]#value-input { width: 100px; font-size: 1.3em; padding: 10px; }
            .btn-submit { padding: 12px 20px; font-size: 0.9em; }
        }
        @media (max-width: 350px) {
            .expression-box { font-size: 1.1em; gap: 4px; }
            .btn-sign { font-size: 0.85em; }
        }

        @keyframes attemptsBlink {
            0%, 100% { background-color: #fef3c7; border-color: #d1d5db; color: #334155; }
            50%      { background-color: #e5e7eb; border-color: #f59e0b; color: #334155; }
        }
        @keyframes step0Blink {
            0%, 100% { background-color: #fef3c7; border-color: #d1d5db; color: #334155; }
            50%      { background-color: #e5e7eb; border-color: #f59e0b; color: #334155; }
        }
        .attempts-counter.blink { animation: attemptsBlink 0.2s linear 5; }
    </style>
</head>
<body>

<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Nombres enters</h1>
</div>

<div class="panel" id="main-panel">
    <div id="game-screen" style="display:none;">
        <div class="header-info">
            <div class="header-left">
                <div class="session-text" id="session-display">Sessió 1 de 3</div>
                <div class="level-text"   id="lvl-display">Operació 1 de 10</div>
            </div>
            <div class="score-text" id="score-display">Punts: 0</div>
            <div id="attempts-display" class="attempts-counter">Intents: 6</div>
        </div>

        <div class="expression-box" id="expression-box" role="group" aria-label="Expressió matemàtica"></div>
        <div id="op-instruction" class="op-instruction" aria-live="polite"></div>

        <div class="resolution-panel" id="resolution-panel">
            <div class="sub-problem" id="sub-problem-display" aria-live="polite"></div>

            <div class="step-container" id="step-sign">
                <div class="step-title">Signe del resultat?</div>
                <div class="sign-buttons" role="group" aria-label="Tria el signe">
                    <button class="btn-sign" onclick="checkSign('negatiu', this)" aria-label="Negatiu">negatiu</button>
                    <button class="btn-sign" onclick="checkSign('zero',    this)" aria-label="Zero">zero</button>
                    <button class="btn-sign" onclick="checkSign('positiu', this)" aria-label="Positiu">positiu</button>
                </div>
            </div>

            <div class="step-container" id="step-value">
                <div class="step-title">Resultat numèric?</div>
                <div class="value-input-group">
                    <input type="text" id="value-input" autocomplete="off" aria-label="Resultat numèric">
                    <button class="btn-submit" id="btn-submit-val" onclick="checkValue()">OK</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/game-core.js"></script>

<script>
    const els = {
        body:            document.body,
        gameScreen:      document.getElementById('game-screen'),
        sessionDisplay:  document.getElementById('session-display'),
        lvlDisplay:      document.getElementById('lvl-display'),
        scoreDisplay:    document.getElementById('score-display'),
        attemptsDisplay: document.getElementById('attempts-display'),
        expressionBox:   document.getElementById('expression-box'),
        opInstruction:   document.getElementById('op-instruction'),
        resolutionPanel: document.getElementById('resolution-panel'),
        subProblem:      document.getElementById('sub-problem-display'),
        stepSign:        document.getElementById('step-sign'),
        stepValue:       document.getElementById('step-value'),
        valueInput:      document.getElementById('value-input'),
        btnSubmitVal:    document.getElementById('btn-submit-val'),
    };

    let isPenalizing   = false;
    let tokens         = [];
    let activeOpIndex  = -1;
    let expectedSubAns = null;
    let opBlinkTimeoutId     = null;
    let opCueDelayTimeoutId  = null;
    let opCueLocked          = false;

    // ---- GENERACIÓ D'EXPRESSIONS ----
    function getTerm() {
        if (Math.random() > 0.5) {
            return [
                { type: 'num', val: randInt(-8, 8) },
                { type: 'op',  val: '·' },
                { type: 'num', val: randInt(-8, 8) }
            ];
        } else {
            const b   = randIntNonZero(-8, 8);
            const ans = randInt(-8, 8);
            return [
                { type: 'num', val: b * ans },
                { type: 'op',  val: ':' },
                { type: 'num', val: b }
            ];
        }
    }

    function getNum() { return [{ type: 'num', val: randInt(-15, 15) }]; }

    function generateExpression(opIndex) {
        const op1 = Math.random() > 0.5 ? '+' : '-';
        const op2 = Math.random() > 0.5 ? '+' : '-';

        if (opIndex <= 1) {
            return opIndex === 0
                ? [...getNum(), { type: 'op', val: op1 }, ...getNum()]
                : getTerm();
        }
        if (opIndex <= 4) {
            const term = getTerm(), num = getNum();
            return Math.random() > 0.5
                ? [...term, { type: 'op', val: op1 }, ...num]
                : [...num,  { type: 'op', val: op1 }, ...term];
        }
        if (opIndex <= 7) {
            return [...getTerm(), { type: 'op', val: op1 }, ...getTerm()];
        }
        const parts = [getTerm(), getTerm(), getNum()];
        parts.sort(() => Math.random() - 0.5);
        return [...parts[0], { type: 'op', val: op1 }, ...parts[1], { type: 'op', val: op2 }, ...parts[2]];
    }

    function calculate(a, op, b) {
        switch (op) {
            case '+': return a + b;
            case '-': return a - b;
            case '·': return a * b;
            case ':': return a / b;
        }
    }

    function getOpPriority(op) {
        if (op === '·' || op === ':') return 2;
        if (op === '+' || op === '-') return 1;
        return 0;
    }

    function getValidOpIndices() {
        const validIds = [];
        const ops = [];
        for (let i = 0; i < tokens.length; i++) {
            if (tokens[i].type === 'op') ops.push({ index: i, val: tokens[i].val, p: getOpPriority(tokens[i].val) });
        }
        function isBoundToP2(idx) {
            if (idx > 0 && tokens[idx-1].type === 'op' && getOpPriority(tokens[idx-1].val) === 2) return true;
            if (idx < tokens.length-1 && tokens[idx+1].type === 'op' && getOpPriority(tokens[idx+1].val) === 2) return true;
            return false;
        }
        let p2Block = [];
        for (let i = 0; i < ops.length; i++) {
            if (ops[i].p === 2) { p2Block.push(ops[i].index); }
            else { if (p2Block.length > 0) { validIds.push(p2Block[0]); p2Block = []; } }
        }
        if (p2Block.length > 0) validIds.push(p2Block[0]);
        for (let i = 0; i < ops.length; i++) {
            if (ops[i].p === 1) {
                const opIdx = ops[i].index;
                if (!isBoundToP2(opIdx-1) && !isBoundToP2(opIdx+1)) {
                    const leftOp = (i > 0) ? ops[i-1].val : null;
                    if (leftOp !== '-') validIds.push(opIdx);
                }
            }
        }
        return validIds;
    }

    function formatNum(num, isFirst = false) {
        if (num < 0 && !isFirst) return `(${num})`;
        return String(num);
    }

    function clearOpSelectionCue() {
        if (opBlinkTimeoutId)    { clearTimeout(opBlinkTimeoutId);    opBlinkTimeoutId = null; }
        if (opCueDelayTimeoutId) { clearTimeout(opCueDelayTimeoutId); opCueDelayTimeoutId = null; }
        els.opInstruction.classList.remove('active');
        els.opInstruction.innerText = '';
        els.expressionBox.querySelectorAll('.token-op.step0-blink').forEach(b => b.classList.remove('step0-blink'));
    }

    function showOpSelectionCue() {
        clearOpSelectionCue();
        const opButtons = els.expressionBox.querySelectorAll('.token-op');
        if (opCueLocked || activeOpIndex !== -1 || isTransitioning || opButtons.length <= 1) return;
        els.opInstruction.innerText = "Clica a l'operació que cal fer a continuació";
        els.opInstruction.classList.add('active');
        opButtons.forEach(b => b.classList.add('step0-blink'));
        opBlinkTimeoutId = setTimeout(() => {
            opButtons.forEach(b => b.classList.remove('step0-blink'));
            opBlinkTimeoutId = null;
        }, 2000);
    }

    function showOpPriorityErrorThenCue() {
        clearOpSelectionCue();
        const opButtons = els.expressionBox.querySelectorAll('.token-op');
        if (activeOpIndex !== -1 || isTransitioning || opButtons.length <= 1) { opCueLocked = false; return; }
        opCueLocked = true;
        els.opInstruction.innerHTML = `<span class="op-instruction-line error">Error: has de complir la prioritat d'operacions</span>`;
        els.opInstruction.classList.add('active');
        opCueDelayTimeoutId = setTimeout(() => {
            if (activeOpIndex !== -1 || isTransitioning) { opCueLocked = false; return; }
            els.opInstruction.innerHTML = `
                <span class="op-instruction-line error">Error: has de complir la prioritat d'operacions</span>
                <span class="op-instruction-line hint">Clica a l'operació que cal fer a continuació</span>
            `;
            opButtons.forEach(b => b.classList.add('step0-blink'));
            opBlinkTimeoutId = setTimeout(() => {
                opButtons.forEach(b => b.classList.remove('step0-blink'));
                opBlinkTimeoutId = null;
            }, 2000);
            opCueLocked = false;
        }, 500);
    }

    function updateUI() {
        els.sessionDisplay.innerText  = `Sessió ${currentSession + 1} de ${TOTAL_SESSIONS}`;
        els.lvlDisplay.innerText      = `Operació ${currentOperation + 1} de ${TOTAL_OPERATIONS}`;
        els.scoreDisplay.innerText    = `Punts: ${sessionScore}`;
        els.attemptsDisplay.innerText = `Intents: ${attemptsLeft}`;
        els.attemptsDisplay.className = 'attempts-counter' + (attemptsLeft < 3 ? ' danger' : '');
        els.expressionBox.innerHTML   = '';

        let opCount = 0;
        tokens.forEach((tok, index) => {
            const el = document.createElement(tok.type === 'op' ? 'button' : 'span');
            if (tok.type === 'op') {
                opCount++;
                const opLabel = { '+':'suma', '-':'resta', '·':'multiplicació', ':':'divisió' };
                el.className = 'token-op';
                el.innerText = tok.val;
                el.id = `op-${index}`;
                el.setAttribute('aria-label', `Operador ${opLabel[tok.val] || tok.val}`);
                el.onclick = () => handleOpClick(index, el);
            } else {
                el.className = 'token-num';
                if (tok.resolved) el.classList.add('resolved-num');
                el.id = `num-${index}`;
                el.innerText = formatNum(tok.val, index === 0);
            }
            els.expressionBox.appendChild(el);
        });

        // 🟢 CORRECCIÓ 6: Reaplicar els colors i selectors visuals si recreem la UI a mitja operació
        if (activeOpIndex !== -1) {
            const opBtn = document.getElementById(`op-${activeOpIndex}`);
            if (opBtn) opBtn.classList.add('auto-selected');
            const leftNum = document.getElementById(`num-${activeOpIndex - 1}`);
            if (leftNum) leftNum.classList.add('highlight');
            const rightNum = document.getElementById(`num-${activeOpIndex + 1}`);
            if (rightNum) rightNum.classList.add('highlight');
        }

        const cueInProgress = opBlinkTimeoutId !== null || opCueDelayTimeoutId !== null;
        if (activeOpIndex === -1 && !isTransitioning && opCount > 1 && !opCueLocked && !cueInProgress) showOpSelectionCue();
        else if (!cueInProgress) clearOpSelectionCue();
        if (activeOpIndex === -1) els.resolutionPanel.style.display = 'none';
        if (opCount === 1 && activeOpIndex === -1 && !isTransitioning) {
            setTimeout(() => {
                const idx = tokens.findIndex(t => t.type === 'op');
                const btn = document.getElementById(`op-${idx}`);
                if (btn) handleOpClick(idx, btn);
            }, 50);
        }
    }

    function buildLevel() {
        attemptsLeft   = MAX_INTENTS;
        tokens         = generateExpression(currentOperation);
        activeOpIndex  = -1;
        expectedSubAns = null;
        isTransitioning = false;
        isPenalizing    = false;
        opCueLocked     = false;
        els.body.style.backgroundColor = bgColors[(currentSession * TOTAL_OPERATIONS + currentOperation) % bgColors.length];
        clearOpSelectionCue();
        updateUI();
    }

    function penalize() {
        if (isPenalizing || isTransitioning) return;
        isPenalizing = true;
        els.attemptsDisplay.classList.add('blink');
        setTimeout(() => {
            els.attemptsDisplay.classList.remove('blink');
            attemptsLeft--;
            if (attemptsLeft <= 0) {
                isTransitioning = true;
                els.stepValue.classList.remove('active');
                els.stepSign.classList.remove('active');
                
                // 🟢 CORRECCIÓ 2: Amagar el teclat si ens quedem sense intents
                hideCustomKeyboard();
            }
            isPenalizing = false;
            updateUI();
            if (attemptsLeft <= 0) _finishOp(0);
        }, 1000);
    }

    function _finishOp(levelPoints) {
        const waitTime = showMiniOverlay(levelPoints);
        setTimeout(() => {
            hideMiniOverlay();
            if (currentOperation + 1 >= TOTAL_OPERATIONS) {
                // 🟢 CORRECCIÓ 1: Eliminat sessionScores.push(sessionScore) d'aquí per no duplicar-lo. 
                // endSession() ja se n'encarrega!
                endSession();
            } else {
                currentOperation++;
                buildLevel();
            }
        }, waitTime);
    }

    function handleOpClick(index, btnElement) {
        if (attemptsLeft <= 0 || activeOpIndex !== -1 || isTransitioning || isPenalizing) { btnElement.blur(); return; }
        const validIndices = getValidOpIndices();
        if (!validIndices.includes(index)) {
            btnElement.classList.add('error-shake');
            setTimeout(() => btnElement.classList.remove('error-shake'), 200);
            opCueLocked = true; clearOpSelectionCue(); penalize();
            if (attemptsLeft > 0 && !isTransitioning) showOpPriorityErrorThenCue();
            btnElement.blur(); return;
        }
        opCueLocked = false; clearOpSelectionCue();
        activeOpIndex  = index;
        const a = tokens[index-1].val, op = tokens[index].val, b = tokens[index+1].val;
        expectedSubAns = calculate(a, op, b);
        document.getElementById(`num-${index-1}`).classList.add('highlight');
        document.getElementById(`num-${index+1}`).classList.add('highlight');
        btnElement.classList.add('auto-selected');
        els.resolutionPanel.style.display = 'flex';
        els.subProblem.innerText = `${formatNum(a, true)} ${op} ${formatNum(b)}`;
        els.stepSign.classList.add('active');
        els.stepValue.classList.remove('active');
        btnElement.blur();
    }

    function checkSign(selectedSign, btnElement) {
        if (activeOpIndex === -1 || isTransitioning || isPenalizing) return;
        const correctSign = expectedSubAns === 0 ? 'zero' : expectedSubAns > 0 ? 'positiu' : 'negatiu';
        
        const a = tokens[activeOpIndex - 1].val;
        const op = tokens[activeOpIndex].val;
        const b = tokens[activeOpIndex + 1].val;
        const stepQuestion = `Signe de: ${formatNum(a, true)} ${op} ${formatNum(b)}`;

        if (selectedSign !== correctSign) {
            btnElement.classList.add('error-shake');
            setTimeout(() => btnElement.classList.remove('error-shake'), 200);
            recordAnswerToHistory(stepQuestion, selectedSign, false);
            penalize(); btnElement.blur(); return;
        }
        
        recordAnswerToHistory(stepQuestion, selectedSign, true);
        
        if (correctSign === 'zero') { finalizeSubProblem(); }
        else {
            els.stepSign.classList.remove('active');
            els.stepValue.classList.add('active');
            els.valueInput.value = '';
            if (isTouchDevice()) {
                showCustomKeyboard(els.valueInput);
            } else {
                els.valueInput.focus();
            }
        }
    }

    function checkValue() {
        if (activeOpIndex === -1 || isTransitioning || isPenalizing) return;
        const rawValue = els.valueInput.value.trim();
        if (rawValue === '') return;

        // 🟢 CORRECCIÓ 5: Regex estricte per evitar valors amb trampa com "1e2", "0x10", etc.
        if (!/^-?\d+$/.test(rawValue)) {
             els.btnSubmitVal.classList.add('error-shake');
             setTimeout(() => els.btnSubmitVal.classList.remove('error-shake'), 200);
             penalize();
             return;
        }

        const userAnswer = parseInt(rawValue, 10);
        
        const a = tokens[activeOpIndex - 1].val;
        const op = tokens[activeOpIndex].val;
        const b = tokens[activeOpIndex + 1].val;
        const stepQuestion = `Valor de: ${formatNum(a, true)} ${op} ${formatNum(b)}`;

        if (userAnswer !== expectedSubAns) {
            els.btnSubmitVal.classList.add('error-shake');
            setTimeout(() => els.btnSubmitVal.classList.remove('error-shake'), 200);
            recordAnswerToHistory(stepQuestion, rawValue, false);
            
            penalize();
            if (isTouchDevice()) {
                kbMarkForOverwrite(els.valueInput);
            } else {
                els.valueInput.value = ''; els.valueInput.focus();
            }
            return;
        }
        
        recordAnswerToHistory(stepQuestion, rawValue, true);
        
        // 🟢 CORRECCIÓ 2: Teclat forçat a ocultar-se en encertar
        hideCustomKeyboard();
        finalizeSubProblem();
    }

    function finalizeSubProblem() {
        tokens.splice(activeOpIndex - 1, 3, { type: 'num', val: expectedSubAns, resolved: true });
        activeOpIndex = -1; expectedSubAns = null;
        els.stepValue.classList.remove('active');
        els.stepSign.classList.remove('active');
        els.valueInput.value = '';
        updateUI();
        if (tokens.length === 1) {
            isTransitioning = true;
            const fails       = MAX_INTENTS - attemptsLeft;
            const levelPoints = Math.max(0, 10 - (fails * 2));
            sessionScore     += levelPoints;
            els.scoreDisplay.innerText = `Punts: ${sessionScore}`;
            _finishOp(levelPoints);
        }
    }

    // 🟢 CORRECCIÓ 3: Prevenir event.preventDefault() global i problemes d'accessibilitat
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            // Només interceptem l'Enter quan estem efectivament actius al pas de valor de la pantalla de joc.
            if (els.gameScreen.style.display !== 'none' && els.stepValue.classList.contains('active')) {
                e.preventDefault(); 
                if (!isTransitioning) checkValue();
            }
        }
    });

    function checkCurrentCell() { checkValue(); }

    injectSharedHTML();
    validateConfig();
    initCustomKeyboard({ allowNegative: true });
    startGame();
</script>
</body>
</html>
